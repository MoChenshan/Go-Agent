global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ['vllm:8000']
        labels:
          service: vllm
          env: dev

  - job_name: rag
    metrics_path: /metrics
    static_configs:
      - targets: ['rag:8001']
        labels:
          service: rag
          env: dev

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          service: qdrant
          env: dev
