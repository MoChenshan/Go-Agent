# =============================================================================
# prometheus.yml —— 抓取 RAG / vLLM / Qdrant 指标
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "gameops-llm"
    env: "dev"

scrape_configs:
  # -------- RAG 服务（自定义指标） --------
  - job_name: "rag_serve"
    metrics_path: /metrics
    static_configs:
      - targets: ["rag_serve:8100"]
        labels: { service: "rag" }

  # -------- vLLM（V1 原生暴露 /metrics） --------
  - job_name: "vllm_expert"
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm_expert:8000"]
        labels: { service: "vllm", model: "qwen3-8b-knowledge-sft" }

  # -------- Qdrant（自带 :6333/metrics） --------
  - job_name: "qdrant"
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels: { service: "vector_db" }

  # -------- Node Exporter（可选） --------
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels: { service: "host" }
