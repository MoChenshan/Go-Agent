# DVC pipeline — project-llm 数据/训练/评测可复现化
#
# 目的：让数据、训练、评测产物有版本、有依赖、可一键 reproduce。
# 用法：
#   dvc init
#   dvc repro              # 全链路重跑
#   dvc repro train_sft    # 单跑某阶段
#   dvc dag                # 看依赖图
#
# 注意：本文件不强制启用，团队可按需 dvc init 后接管。
#       data/ 与 ckpt/ 已在 .gitignore，避免大文件入 Git。

stages:

  data_pipeline:
    cmd: python scripts/data_pipeline.py --in data/raw --out data/processed
    deps:
      - scripts/data_pipeline.py
      - data/raw
    outs:
      - data/processed/sft_demo.jsonl
    desc: "原始数据 → 去重 / PII 过滤 / 格式标准化"

  data_replay:
    cmd: >-
      python scripts/data_replay_buffer.py
      --base data/processed/sft_demo.jsonl --new data/feedback
      --out data/processed/replay.jsonl --ratio 0.2 --total 25000
    deps:
      - scripts/data_replay_buffer.py
      - data/processed/sft_demo.jsonl
    outs:
      - data/processed/replay.jsonl
    desc: "数据飞轮：旧 80% + 新 20% 混合，防遗忘"

  train_sft:
    cmd: llamafactory-cli train configs/npc_sft.yaml
    deps:
      - configs/npc_sft.yaml
      - data/processed/replay.jsonl
    outs:
      - output/npc_sft
    desc: "SFT LoRA 训练（NPC 对话）"

  train_dpo:
    cmd: llamafactory-cli train configs/npc_dpo.yaml
    deps:
      - configs/npc_dpo.yaml
      - output/npc_sft
    outs:
      - output/npc_dpo
    desc: "DPO 偏好对齐"

  train_grpo:
    cmd: llamafactory-cli train configs/npc_grpo.yaml
    deps:
      - configs/npc_grpo.yaml
      - output/npc_dpo
      - data/processed/npc_grpo_prompts.json
    outs:
      - output/npc_grpo
    desc: "GRPO 强化学习（NPC 角色一致性）"

  merge:
    cmd: python scripts/merge_lora.py --base Qwen/Qwen3-4B --lora output/npc_grpo --out output/npc_merged
    deps:
      - scripts/merge_lora.py
      - output/npc_grpo
    outs:
      - output/npc_merged
    desc: "合并 LoRA 权重"

  quantize_awq:
    cmd: python scripts/quantize_awq.py --model output/npc_merged --out output/npc_serve_awq
    deps:
      - scripts/quantize_awq.py
      - output/npc_merged
    outs:
      - output/npc_serve_awq
    desc: "AWQ-W4A16 量化（A10/L20 部署）"

  eval_full:
    cmd: >-
      python scripts/evaluate.py
      --model_path output/npc_merged
      --test_set data/test/npc_test.json
      --report eval/report.md
      --mode npc
      --engine hf
    deps:
      - scripts/evaluate.py
      - data/test/npc_test.json
      - output/npc_merged
    metrics:
      - eval/report.md:
          cache: false
    desc: "全套评测：精确指标 + G-Eval + RAGAS"

  eval_redteam:
    cmd: >-
      python scripts/red_team_eval.py
      --golden eval/red_team.jsonl --threshold 0.95
      --report eval/redteam_report.json
    deps:
      - scripts/red_team_eval.py
      - eval/red_team.jsonl
      - output/npc_merged
    metrics:
      - eval/redteam_report.json:
          cache: false
    desc: "红队评测（CI 安全门禁）"
