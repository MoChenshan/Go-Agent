# golangci-lint 配置
# 文档参考: https://github.com/golangci/golangci-lint

linters-settings:
  funlen:
    lines: 80
    statements: 80
  goconst:
    min-len: 2
    min-occurrences: 2
  gocyclo:
    min-complexity: 20
  goimports:
    # local-prefixes: git.code.oa.com
  govet:
    enable:
      - shadow
  lll:
    line-length: 120
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-checks:
      - nestingReduce
    settings:
      nestingReduce:
        bodyWidth: 5

linters:
  disable-all: true
  enable:
    - funlen
    - goconst
    - gocyclo
    - gofmt
    - ineffassign
    - staticcheck
    - typecheck
    - goimports
    - gosimple
    - govet
    - lll
    - rowserrcheck
    - errcheck
    - unused
    - sqlclosecheck
    - revive # 替代 golint

run:
  timeout: 20m

issues:
  exclude-use-default: true

  # golanglint-ci 维护的忽略列表里有一些是我们不想屏蔽的,捞出来
  include:
    - EXC0002 # golint (comment on exported (method|function|type|const)|should have( a package)? comment|comment should be of the form)
    - EXC0003 # golint func name will be used as test\.Test.* by other packages, and that stutters; consider calling this
    - EXC0004 # govet (possible misuse of unsafe.Pointer|should have signature)
    - EXC0005 # staticcheck ineffective break statement. Did you mean to break out of the outer loop
    - EXC0011 # stylecheck (comment on exported (method|function|type|const)|should have( a package)? comment|comment should be of the form)

  exclude-rules:
    - path: _test\.go
      linters:
        - funlen # 单测函数可以到160行,直接不检查单测的函数长度
    - linters:
        - staticcheck
      text: "SA1019: package github.com/golang/protobuf" # protobuf 库稳定,忽略弃用警告
    - linters:
        - staticcheck
      text: "SA6002: argument should be pointer-like to avoid allocations"
    - linters:
        - lll
      source: "^//go:generate " # 排除 go:generate 长行
    # GORM struct tag 行较长,常见情况
    - linters:
        - lll
      source: "gorm:.*json:"
    # jsonschema struct tag 行较长,常见情况
    - linters:
        - lll
      source: "jsonschema:"
    # revive 包名下划线（项目现有风格）
    - linters:
        - revive
      text: "don't use an underscore in package name"
    # 长函数签名（常见于依赖注入和接口实现）
    - linters:
        - lll
      source: "^func "
    # log.InfoContextf 等日志语句可以较长
    - linters:
        - lll
      source: "log\\.(Info|Error|Debug|Warn)Contextf"
    # 测试文件 dot-imports
    - linters:
        - revive
      text: "dot-imports"
      path: "_test\\.go"
    # 树形结构符号常量
    - linters:
        - goconst
      text: "├──|└──"

  max-same-issues: 0
  new: false
  max-issues-per-linter: 0

output:
  sort-results: true
