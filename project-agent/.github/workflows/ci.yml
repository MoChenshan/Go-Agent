name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: project-agent
          args: --timeout=5m

  test:
    name: Test (stub build)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: project-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: unit test
        run: go test -race -count=1 -coverprofile=coverage.out ./src/...
      - name: coverage report
        run: go tool cover -func=coverage.out | tail -n 20
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: project-agent/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: project-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: build (stub)
        run: go build -trimpath -o /tmp/gameops-agent .
      - name: smoke (--help)
        run: /tmp/gameops-agent -h || true   # 当前 main 用 flag，无 -h 退出码非 0 也可接受
