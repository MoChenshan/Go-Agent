# golangci-lint 配置 — gameops-agent
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.24"
  tests: true
  modules-download-mode: readonly
  build-tags:
    - a2a
    - agui

linters:
  disable-all: true
  enable:
    - errcheck         # 检查未处理的 error
    - gosimple         # 简化建议
    - govet            # vet
    - ineffassign      # 无效赋值
    - staticcheck      # 静态分析
    - typecheck
    - unused
    - misspell         # 拼写
    - gocyclo          # 圈复杂度
    - goconst          # 重复字符串提取常量
    - gofmt
    - goimports
    - revive           # golint 替代
    - bodyclose        # http.Response.Body 必须关
    - rowserrcheck     # database/sql 错误检查
    - sqlclosecheck    # rows / stmt 必须关
    - prealloc         # slice 预分配建议
    - exportloopref    # for 循环变量逃逸
    - gosec            # 安全规则（注意：误报较多，已 exclude 部分）

linters-settings:
  gocyclo:
    min-complexity: 20
  goconst:
    min-len: 4
    min-occurrences: 4
  misspell:
    locale: US
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
      - name: var-naming
      - name: error-return
  gosec:
    excludes:
      - G404  # math/rand 在 idempotency 等无安全要求场景使用
      - G501  # md5（仅用作非加密 hash）

issues:
  exclude-dirs:
    - vendor
    - data
    - eval/data
    - knowledge/docs
  exclude-rules:
    # 测试文件放宽
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocyclo
        - goconst
    # mock/stub 文件放宽
    - path: .*_stub\.go
      linters:
        - unused
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
