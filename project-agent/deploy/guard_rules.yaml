# GameOps Agent 安全防护规则集（D17.1）
#
# 加载方式：在 config.yaml 中设置 `guard_rules_path: deploy/guard_rules.yaml`，
# 启动时加载，并由 RuleWatcher 每 5s 轮询 mtime 热替换。
# 解析或编译失败时保留旧规则，不会让 guard 降为"无规则"状态。
#
# 规则含义：
#   input.max_user_chars：用户输入长度兜底，超过即拦截（防提示稀释攻击）
#   input.rules：正则 + 可选 require_contains（二次关键词判定，降低误伤）
#   output.rules：正则 + replacement（命中即打码）
#
# 本样板与代码里 DefaultInputRules / DefaultOutputRules 对齐，可直接投产。

input:
  max_user_chars: 32768

  rules:
    # --- OWASP LLM01 Prompt Injection ---
    - name: prompt_injection_jailbreak
      pattern: "(?i)(ignore\\s+(all\\s+|the\\s+)?(previous|above)\\s+(instruction|prompt)s?|disregard\\s+(the\\s+)?system\\s+prompt|jailbreak\\s+mode|忽略(以上|前面|所有)的?(指令|提示|规则)|请忽略系统提示)"
      reason: "检测到疑似越狱指令（覆盖/忽略系统提示）；已拒绝。"

    - name: prompt_injection_leak_system
      pattern: "(?i)(print\\s+(your\\s+)?(system\\s+)?prompt|reveal\\s+(the\\s+)?(system\\s+)?instructions?|show\\s+me\\s+your\\s+system\\s+message|显示(你的)?系统提示|告诉我系统提示词|输出系统提示词)"
      reason: "检测到要求输出系统提示的请求；已拒绝。"

    - name: prompt_injection_shell
      pattern: "(?i)(\\brm\\s+-rf\\s+/|:\\(\\)\\{:\\|:&\\};:|\\bcurl\\s+[^\\s]+\\s*\\|\\s*(sh|bash)\\b|\\bwget\\s+[^\\s]+\\s*\\|\\s*(sh|bash)\\b)"
      reason: "检测到危险 Shell 命令模式（rm -rf / fork bomb / pipe-to-sh）；已拒绝。"

    # base64 长串必须同时带"解码/执行"语义才算命中，降低日志粘贴误伤
    - name: prompt_injection_base64_payload
      pattern: "[A-Za-z0-9+/=]{80,}"
      reason: "检测到长 base64 载荷且带解码/执行语义；疑似走私攻击，已拒绝。"
      require_contains:
        - decode
        - execute
        - 运行
        - 执行

    - name: prompt_injection_bad_url
      pattern: "(?i)(file://|data:text/html|javascript:)"
      reason: "检测到非常规协议 URL（file:// / data:text/html / javascript:）；已拒绝。"

output:
  rules:
    # --- OWASP LLM06 Sensitive Info Disclosure ---
    # 覆盖：OpenAI sk-、GitHub PAT、通用 JWT 三段式
    - name: token_like_secret
      pattern: "sk-[A-Za-z0-9]{20,}|gh[oupsr]_[A-Za-z0-9]{36,}|eyJ[A-Za-z0-9_\\-]{10,}\\.eyJ[A-Za-z0-9_\\-]{10,}\\.[A-Za-z0-9_\\-]{10,}"
      replacement: "[REDACTED_TOKEN]"

    # 内网 IPv4（10.x / 172.16-31.x / 192.168.x）
    - name: private_ipv4
      pattern: "\\b(?:10(?:\\.\\d{1,3}){3}|172\\.(?:1[6-9]|2\\d|3[01])(?:\\.\\d{1,3}){2}|192\\.168(?:\\.\\d{1,3}){2})\\b"
      replacement: "[REDACTED_PRIVATE_IP]"

    # password=xxx / api_key=xxx / secret=xxx 等（=/:后非空白 ≥ 6 位）
    - name: credential_literal
      pattern: "(?i)(password|pwd|secret|api[_-]?key)\\s*[:=]\\s*[^\\s'\"`]{6,}"
      replacement: "[REDACTED_CREDENTIAL]"
