# OpenTelemetry Collector 配置（用于本地 docker-compose 栈）
#
# 接收 Agent 发来的 OTLP（gRPC/HTTP），输出到：
#   - Jaeger（traces）
#   - Prometheus 抓取（metrics，via prometheus exporter）
#   - 控制台（debug，可调）

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
  # 屏蔽含 PII 的属性键（双保险，主要由 agent 侧 PII guard 处理）
  attributes/redact:
    actions:
      - key: gen_ai.prompt
        action: hash
      - key: gen_ai.completion
        action: hash

exporters:
  # Traces → Jaeger
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → 暴露 :8889/metrics 给 Prometheus 抓
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: gameops

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes/redact, batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
