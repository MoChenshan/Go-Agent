app_name: "openclaw"

# 可选：状态目录。用于保存上传文件、debug 数据、托管 skills 等。
state_dir: "~/.trpc-agent-go/openclaw"

# 推荐：把模型和企业微信敏感配置放到 ~/.bashrc 之类的 shell
# 启动文件里，当前模板默认读取 OPENAI_* / WECOM_* 环境变量。
# WECOM_GROUP_SESSION_MODE 是可选项，不设置也能启动；
# group_session_mode 留空时会回退到 shared。
# 注意：YAML 里的其他 env 占位符如果没有对应环境变量，
# 启动会直接报错。

# 可选：debug recorder。
debug_recorder:
  enabled: true
  dir: "${TRPC_CLAW_STATE_DIR}/debug"
  mode: "full" # full | safe

# 可选：上游 openclaw/app 直跑时使用的 HTTP 监听地址。
# 当前这个 tRPC 分发版的实际监听地址和端口由 trpc_go.yaml 决定，
# 所以这里通常不用配。
# http:
#   addr: ":8080"

# 可选：admin surface。
# 当前 cmd/openclaw 会单独启动 admin HTTP server，监听地址由这里决定。
admin:
  enabled: true
  addr: "127.0.0.1:19789"
  auto_port: true

# 可选：Langfuse tracing。
# LANGFUSE_HOST / LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY 由 exporter
# 直接从进程环境读取；下面这些开关和 admin 链接也都可以用 env 覆盖。
observability:
  langfuse:
    enabled: ${LANGFUSE_ENABLED:-true}
    required: ${LANGFUSE_REQUIRED:-false}
    ui_base_url: "${LANGFUSE_UI_BASE_URL:-}"
    trace_url_template: "${LANGFUSE_TRACE_URL_TEMPLATE:-}"
    observation_leaf_value_max_bytes: ${LANGFUSE_OBSERVATION_LEAF_VALUE_MAX_BYTES:-4096}

# Agent 运行参数。
# 这里默认启用了 GitHub trpc-agent-go README 里的基础人格设定：
# "You are a helpful assistant."
agent:
  # 默认会从 state_dir/prompts/** 加载 instruction / system prompt
  # 片段；这里的标量字段适合做额外的 inline 覆盖。
  instruction: "You are a helpful assistant."
  # system_prompt: ""
  # off = 关闭 persona 文件注入。
  persona: "pragmatic" # pragmatic | friendly | professional | concise | coach | creative | candid | quirky | nerdy | snarky | girlfriend | boyfriend | off
  # persona_dir: "${TRPC_CLAW_STATE_DIR}/personas"
  # type: "llm" # llm | claude-code
  # 当前默认走 file-based memory：
  # 优先注入工作区里最近的 AGENTS.md；如果没有，会回退到
  # ~/.trpc-agent-go/AGENTS.md。用户级 MEMORY.md 也会自动注入。
  add_session_summary: true
  enable_context_compaction: true
  context_compaction_oversized_tool_result_max_tokens: 8192
  # max_history_runs: 0
  preload_memory: 0
  # instruction_files:
  #   - "./prompts/instruction.md"
  # 不写时默认读取 state_dir/prompts/instruction 下的片段。
  # instruction_dir: "./prompts/instruction"
  # system_prompt_files:
  #   - "./prompts/system/runtime_identity.md"
  # 不写时默认读取 state_dir/prompts/system 下的片段。
  # system_prompt_dir: "./prompts/system"
  # ralph_loop:
  #   enabled: false
  #   max_iterations: 0
  #   completion_promise: "I have fully completed the task."
  #   promise_tag_open: "<promise>"
  #   promise_tag_close: "</promise>"
  #   verify:
  #     command: "go test ./..."
  #     work_dir: "."
  #     timeout: "5m"
  #     env:
  #       - "KEY=VALUE"
  # claude_bin: "claude"
  # claude_output_format: "stream-json"
  # claude_extra_args:
  #   - "--dangerously-skip-permissions"
  # claude_env:
  #   - "KEY=VALUE"
  # claude_work_dir: "."

model:
  mode: "openai" # mock | openai
  name: "${OPENAI_MODEL}"
  base_url: "${OPENAI_BASE_URL}"
  # api key comes from OPENAI_API_KEY.
  # openai_variant: "auto" # auto | openai | deepseek | qwen | hunyuan
  # generation_config:
  #   # Stream defaults to true. Set false only if you want one buffered
  #   # final reply instead of incremental text.
  #   stream: true
  #   # max_tokens: 2048
  #   # temperature: 0.7
  # config:
  #   any_model_plugin_specific_key: "any_model_plugin_specific_value"

# 可选：Gateway 全局权限控制。
# gateway:
#   allow_users:
#     - "replace-with-your-userid"
#   require_mention: false
#   mention_patterns:
#     - "@OpenClaw"

channels:
  - type: "wecom"
    name: "wecom-ai"
    config:
      bot_mode: "ai" # notification | ai

      # 可选：企业 ID / 应用 AgentID。
      # 推荐环境变量名：WECOM_CORP_ID / WECOM_AGENT_ID
      # corp_id: "ww1234567890"
      # agent_id: "1000002"

      token: "${WECOM_TOKEN}" # 必填，推荐写进 ~/.bashrc
      encoding_aes_key: "${WECOM_ENCODING_AES_KEY}" # 必填，43 字符

      # 本分发版建议保持 shared mux 模式：
      # 不写或设为 0 时，会复用 trpc.openclaw.gateway 的 HTTP service。
      # 只有你明确要让 channel 自己额外起独立 HTTP 服务时，才设 >0。
      # callback_port: 0
      callback_path: "${WECOM_AI_CALLBACK_PATH}" # 例如 /wecom/ai/callback

      # 可选：用于移除消息里的 @机器人 名称。
      # 推荐环境变量名：WECOM_BOT_NAME
      # bot_name: "OpenClaw"

      # 可选：AI 机器人 ID。
      # 不填时，插件会尝试从回调消息里自动提取。
      # 推荐环境变量名：WECOM_AIBOTID
      # aibotid: "replace-with-your-aibotid"

      # 仅 notification 模式使用；当前 AI 模式不要打开。
      # 推荐环境变量名：WECOM_WEBHOOK_URL
      # webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=replace-with-your-key"

      # 可选：是否启用流式回复。
      # enable_stream: true
      # 可选：控制企微 stream 发帧策略。
      # 默认就是 content_only，不配置时也会走这个模式。
      # full: 保持当前完整快照行为，包含开始/进度/正文/终态。
      # 默认 full，会发送开始提示、进度、正文快照和最终帧。
      # content_only: 只发送正文快照和最终帧。
      # final_only: 只发送最终一帧，最适合排查多端重播问题。
      # stream_snapshot_mode: "content_only"
      # 可选：统一回复前缀。默认关闭。
      # 会以单行 `> ... | ... | ...` 形式挂在回复开头；
      # WebSocket 流式模式也保持在同一个消息气泡里。
      # reply_prefix:
      #   enabled: true
      #   fields: ["persona", "context", "commands", "hint", "links"]
      #   hint: "直接发问题、图片或文件给我"
      #   links:
      #     - label: "Web IDE"
      #       url: "https://ide.example.com/session/${USER}"
      #   commands: ["/help", "/persona", "/status"]
      #   # 如需展示工作区状态，再显式加 workspace 字段；
      #   # 这里只会显示紧凑标签，不会默认刷完整路径。
      # 可选：覆盖当前 channel 的人格目录。
      # 不写时会复用 agent.persona_dir，或默认走 state_dir/personas。
      # persona_dir: "~/.trpc-agent-go/openclaw/personas"
      # request_system_prompt_files:
      #   - "./prompts/wecom/request_system/base.md"
      # 不写时默认读取 state_dir/prompts/wecom/request_system 下的片段。
      # request_system_prompt_dir: "./prompts/wecom/request_system"

      # 可选：用户点击机器人进入会话时，
      # 自动发送欢迎卡片和快捷入口。默认开启。
      # enter_chat_welcome: true

      # 可选：聊天权限策略。
      # 默认 open；生产更建议 allowlist。
      # chat_policy: "allowlist" # open | disabled | allowlist
      # 列表型字段更适合直接写 YAML，不建议塞单个环境变量字符串。
      # allow_users:
      #   - "replace-with-your-userid"

      # 可选：控制群聊会话范围。
      # shared（默认）会让同一个群共享一段机器人历史，
      # isolated 则让群里每个用户各自维护一段会话。
      group_session_mode: "${WECOM_GROUP_SESSION_MODE}"

      # 可选：控制群里展示用户名时优先使用哪个字段。
      # 只有企微回调里带了 name / alias 时才会显示出来；
      # 否则仍会退回 userid。
      # user_label_mode: "alias_or_name"  # default

      # 可选：显式指定企微用户身份解析命令路径。
      # 不配置时，会自动从已安装 skills 里发现
      # `wecom_user_lookup` capability。
      # user_identity_lookup_command:
      #   "${TRPC_CLAW_STATE_DIR}/platform/bin/wecom_user_lookup"

      # 可选：多模态 URL 传递方式。
      # false: 通过 ContentParts 传递；wecom channel 会先拉取媒体，
      #        再把字节内容交给 Gateway / Model。
      # true: 直接把 URL 嵌入文本，交给 Agent / Tool 自己下载。
      embed_image_url: false
      embed_file_url: false

      # 可选：会话超时和消息聚合窗口。
      # session_timeout: "10m" # 显式开启超时自动分会话
      # aggregate_window: "2s"

# Skills 默认开启。
# 安装脚本会把 GitHub 版默认 skills 同步到 state_dir/skills/bundled，
# 你自己的 skills 建议放到 state_dir/skills/local。
# 如果你有 Codex / skill hub 装下来的 skills，也会自动补到
# ~/.codex/skills。
skills:
  root: "${TRPC_CLAW_STATE_DIR}/skills/bundled"
  extra_dirs:
    - "${TRPC_CLAW_STATE_DIR}/skills/local"
    - "${HOME}/.codex/skills"
    - "./.agents/skills"
  debug: false
  watch: true
  watch_bundled: false
  watch_debounce_ms: 250
  load_mode: "session" # once | turn | session
  # loadMode: "turn"
  max_loaded_skills: 10
  # maxLoadedSkills: 10
  loaded_content_in_tool_results: true
  # loadedContentInToolResults: true
  skip_fallback_on_session_summary: false
  # skipFallbackOnSessionSummary: false
  coding_agent:
    execution_mode: "host" # sandbox | auto | host
    # sandbox: internal coding backend 始终留在 sandbox 里跑，遇到限制就明确报出来。
    # auto: internal coding backend 先走 sandbox；遇到 Landlock / permission denied 再重试一次 host。
    # host: internal coding backend 优先在宿主机跑真实写文件和自检。
    # default_workdir:
    # 如果不写，运行时会直接把当前工作目录当成默认代码工作区。
    # scratch_root: "${TRPC_CLAW_STATE_DIR}/workspaces/scratch"
    # 在企微里也可以按聊天维度发送 /workspace <目录|off> 临时覆盖它。
    # 这里主要提供运行时默认工作区/产物根等上下文，不再鼓励模型显式切去 coding-agent。
    # 如果你自己显式写了 tooling_guidance，上面这个快捷配置就不再生效。
  # tooling_guidance: ""
  # toolingGuidance: ""
  # entries:
  #   coding-agent:
  #     enabled: true
  #   github:
  #     enabled: true

# 默认把常用工具都打开，做到“装完就能玩”。
# providers / toolsets 的 config 结构取决于 type，对应源码里的注册插件。
# 当前上游内置 provider type:
#   - duckduckgo
#   - webfetch_http
# 当前上游内置 toolset type:
#   - mcp
#   - file
#   - openapi
#   - google
#   - wikipedia
#   - arxivsearch
#   - email
# exec_command 以及显式启用的本地执行工具默认会继承当前
# trpc-claw 进程环境。
# 运行时还会自动把当前 trpc-claw 所在目录、state_dir/tools、
# state_dir/toolchain/bin、state_dir/toolchain/python/bin，以及常见
# 用户态 bin 目录（如 ~/.local/bin、~/bin、~/go/bin、~/.cargo/bin
# 和部分 env 推导的 bin）前置到 PATH；这些约定目录不需要预先创建。
# 镜像里额外的目录可通过
# TRPC_CLAW_EXTRA_PATH_DIRS 追加。
tools:
  enable_local_exec: true
  enable_openclaw_tools: true
  openclaw_tooling_guidance: ""
  enable_parallel_tools: true
  refresh_toolsets_on_run: false
  providers:
    - type: "envprobe"
      # 安全检查当前进程和受信任 env 文件里是否声明了某个变量，
      # 只返回存在性与来源，不暴露变量值。
    - type: "duckduckgo"
      config:
        timeout: "30s"
    - type: "webfetch_http"
      config:
        allow_all_domains: true
        timeout: "30s"
        max_content_length: 50000
        max_total_content_length: 150000
        # 如果你要收紧权限，优先改成域名白名单：
        # allowed_domains:
        #   - "docs.qq.com"
        #   - "openai.com"
  toolsets:
    - type: "file"
      name: "fs"
      config:
        base_dir: "${TRPC_CLAW_STATE_DIR}"
        read_only: false
        enable_save: true
        enable_replace: true
        max_file_size: 10485760
        # 如果你只想浏览文件，不想让 Agent 改本地文件：
        # read_only: true
        # 如果你想让它直接读写当前项目目录，也可以改成 "."
    - type: "wikipedia"
      name: "wiki"
      config:
        language: "zh"
        max_results: 5
    - type: "arxivsearch"
      name: "arxiv"
      config:
        page_size: 5
        delay_seconds: "1s"
        num_retries: 3
    # 下面这些能力也支持，但需要你按注释补齐配置后再打开：
    # - type: "google"
    #   name: "google"
    #   config:
    #     lang: "zh-CN"
    #     size: 5
    #     # api_key: "replace-with-your-google-api-key"
    #     # engine_id: "replace-with-your-google-search-engine-id"
    # - type: "openapi"
    #   name: "demo_api"
    #   config:
    #     spec:
    #       file: "./petstore.yaml"
    #     timeout: "30s"
    # - type: "browser"
    #   name: "browser"
    #   config:
    #     default_profile: "openclaw"
    #     profiles:
    #       - name: "openclaw"
    #         transport: "stdio"
    #         command: "trpc-claw-browser-runtime"
    #         args:
    #           - "mcp-stdio"
    # 先用 `trpc-claw-browser-runtime doctor` 看当前运行时是否就绪。
    # 普通网页文本优先走 web_fetch，只有在 JS 渲染、交互、
    # 登录态、下载、截图或视觉验证时再开 browser。
    # 如果环境特殊，只需要关注两个公开变量：
    #   TRPC_CLAW_BROWSER_MODE=auto|headless|interactive
    #   TRPC_CLAW_BROWSER_PATH=/path/to/chromium-or-chrome
    # - type: "email"
    #   name: "mail"

# 可选：Session 后端。
# backend 内置支持:
#   - inmemory
#   - redis
#   - sqlite
#   - mysql
#   - postgres
#   - clickhouse
session:
  backend: "sqlite"
  summary:
    enabled: true
    mode: "auto" # auto: 根据模型 context window 自动触发 | manual: 使用手动阈值
    approx_runes_per_token: 1.6 # 中文场景；英文可设 4.0 或不配（默认 4.0）
    # 以下参数仅在 mode: "manual" 时生效：
    # policy: "any" # any | all
    # event_threshold: 20
    # token_threshold: 0
    # idle_threshold: "30m"
    # max_words: 200
  config:
    path: "${TRPC_CLAW_STATE_DIR}/sessions.sqlite"
    # dsn: "file:${TRPC_CLAW_STATE_DIR}/sessions.sqlite?_busy_timeout=5000"
    # skip_db_init: false
    # table_prefix: "openclaw_"

# 可选：Memory 后端。
# 当前默认主推 file-based memory，不再默认落持久化检索库。
# 如果你确实需要可搜索的结构化 memory，可切回 sqlitevec / pgvector。
# 其中 sqlitevec 更适合做语义检索；正式使用时，需要提供
# OPENAI_API_KEY / OPENAI_BASE_URL，或者显式填写
# memory.config.embedder。
# backend 内置支持:
#   - file
#   - inmemory
#   - redis
#   - sqlite
#   - sqlitevec
#   - mysql
#   - postgres
#   - pgvector
memory:
  backend: "file"
  auto:
    enabled: false
    # policy: "any" # any | all
    # message_threshold: 20
    # time_interval: "30m"
  # 如果你要恢复结构化 / 可检索 memory，可改成例如：
  # backend: "sqlitevec"
  # limit: 100
  # fallback_to_sqlite_on_embedding_unsupported: true
  # auto:
  #   enabled: true
  # config:
  #   path: "${TRPC_CLAW_STATE_DIR}/memories_vec.sqlite"
  #   embedder:
  #     type: "openai"
  #     model: "text-embedding-3-small"
  #     # dimensions: 1536
  #     # api_key: "replace-with-your-openai-api-key"
  #     # organization: "org-..."
  #     # base_url: "https://api.openai.com/v1"
  #   # dsn: "file:${TRPC_CLAW_STATE_DIR}/memories_vec.sqlite?_busy_timeout=5000"
  #   # table_name: "openclaw_memories"
  #   # index_dimension: 1536
  #   # max_results: 10
  #   # skip_db_init: false
  #   # soft_delete: false
